      .logo-loc   { font-family: Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #e84c1e; letter-spacing: 8px; }
    </style>
  </defs>

  <ellipse cx="340" cy="165" rx="68" ry="10" fill="#e84c1e" opacity="0.15"/>
