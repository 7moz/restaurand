  <path d="M272 162 Q272 98 340 92 Q408 98 408 162 Z" fill="#e84c1e"/>

  <path d="M322 85 Q318 74 322 63 Q326 52 322 41" fill="none" stroke="#e84c1e" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M340 82 Q336 69 340 56 Q344 43 340 30" fill="none" stroke="#e84c1e" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M358 85 Q362 74 358 63 Q354 52 358 41" fill="none" stroke="#e84c1e" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

